[stamp]
#stamp_file = Stamp(SHOEI Wire).pdf
stamp_file = Stamp.pdf

# スタンプ幅(mm) / stamp_height=0でアスペクト比自動
stamp_width = 30
stamp_height = 0

# 用紙右上からのオフセット(mm)
offset_x = 10
offset_y = 10

# 日付設定
# %Y 西暦4桁 , %y 西暦2桁 , %m 月2桁 , %#m 月ゼロなし , %d 日2桁 , %#d 日ゼロなし , %H 時(24H) , %M 分 , %S 秒
show_date = true
date_format = %Y/%m/%d
date_font_size = 13
date_color = #FF0000

# 日付y位置: 0.0=下端 1.0=上端 (Stamp.pdf中段空白の中心=0.445)
date_y_ratio = 0.515

# 日付フォント
# 組み込み: Helvetica-Bold / Helvetica / Times-Roman / Courier
# Windows: Meiryo UI / Meiryo UI Bold / MS Gothic / MS Mincho
#          Yu Gothic / Yu Gothic Bold / Yu Mincho / Arial / Arial Bold
date_font = Meiryo UI

# スタンプ注釈プロパティ
author   = (^o^;)
subject  = 出図
stamp_id = Drawing_Release

output_suffix = _stamped
compress_suffix = _compressed
overwrite = false
